# src/monitoring/prometheus.yml
# Prometheus server config — tells Prometheus which targets to scrape.
# Mounted into the prometheus container at /etc/prometheus/prometheus.yml
#
# NOT to be confused with:
#   src/monitoring/grafana/provisioning/datasources/prometheus.yml
# which is a Grafana config that only happens to share the name.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # FastAPI app — exposes /metrics via prometheus_client middleware
  - job_name: rakuten_api
    static_configs:
      - targets: ["api:8000"]

  # Pushgateway — accepts metrics pushed by short-lived Airflow tasks.
  # honor_labels: true keeps the labels the pushing job sets (e.g. dag_id,
  # task_id) instead of overwriting them with the scrape job's labels.
  - job_name: rakuten_pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]