# Grafana datasource provisioning — auto-registers Prometheus as default source.
# Docs: https://grafana.com/docs/grafana/latest/administration/provisioning/#data-sources
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    # Service name on the docker-compose network; NOT localhost
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      # Must be <= prometheus scrape_interval (15s in our prometheus.yml)
      timeInterval: "15s"
