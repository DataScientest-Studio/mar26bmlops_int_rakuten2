services:
  postgres:
    image: postgres:16-alpine
    container_name: rakuten_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: minio_init
    depends_on:
      - minio
    env_file:
      - .env
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD}; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb -p local/mlflow || true;
      mc mb -p local/${MINIO_BUCKET_DATA} || true;
      mc mb -p local/${MINIO_BUCKET_IMAGES} || true;
      echo 'MinIO buckets ensured.';
      "
    restart: "no"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: mlflow
    restart: unless-stopped
    depends_on:
      - postgres
      - minio
      - minio-init
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${MINIO_SECRET_KEY}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
    ports:
      - "5000:5000"
    command: >
      sh -c "pip install --no-cache-dir psycopg2-binary boto3 &&
      mlflow server
      --backend-store-uri ${MLFLOW_BACKEND_STORE_URI}
      --default-artifact-root s3://mlflow/
      --host 0.0.0.0
      --port 5000"

  api:
    build: .
    container_name: rakuten_api
    restart: unless-stopped
    depends_on:
      - postgres
      - mlflow
      - minio
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  training:
    build: .
    container_name: rakuten_training
    restart: "no"
    depends_on:
      - postgres
      - mlflow
      - minio
    env_file:
      - .env
    volumes:
      - .:/app
    working_dir: /app
    command: sleep infinity

volumes:
  postgres_data:
  minio_data: