version: "3.9"

services:

  # ===============================
  # POSTGRES DATABASE
  # ===============================
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema_postgres.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - app-network

  # ===============================
  # MINIO (OBJECT STORAGE)
  # ===============================
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - app-network

  # ===============================
  # MLFLOW SERVER
  # ===============================
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.12.1
    container_name: mlflow
    restart: always
    depends_on:
      - db
      - minio
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri ${DATABASE_URL}
      --default-artifact-root s3://${MINIO_BUCKET_DATA}/mlflow
      --host 0.0.0.0
      --port 5000
    networks:
      - app-network

  # ===============================
  # API SERVICE (OPTIONAL - FUTURE USE)
  # ===============================
  api:
    build: .
    container_name: rakuten_api
    restart: always
    depends_on:
      - db
      - minio
      - mlflow
    env_file:
      - .env
    ports:
      - "8000:8000"
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000
    networks:
      - app-network

# ===============================
# VOLUMES
# ===============================
volumes:
  postgres_data:
  minio_data:

# ===============================
# NETWORK
# ===============================
networks:
  app-network:
    driver: bridge