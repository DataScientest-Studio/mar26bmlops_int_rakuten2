services:


  # -- MinIO S3-compatible local storage --
  minio:
    image: minio/minio:latest
    container_name: rakuten_minio
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command:server /data --console-adress: ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # -- MinIO bucket init (create Bcukets) --
  minio_init:
    image: minio/mc:latest
    container_name: rakuten_minio_init
    depends_on:
      minio:
        condition: service_healthy
    # Creates mlflow-artifacts and dvc-store buckets on first run
    entrypoint: >
      sh -c "
        sleep 10 &&
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/mlflow-artifacts &&
        mc mb --ignore-existing local/dvc-store &&
        echo 'Buckets ready'
      "


  # -- Nginx reverse proxy (public entry point) --
  nginx:
    image: nginx:alpine
    container_name: rakuten_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  # -- MLflow tracking server --
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_SERVER_ALLOWED_HOSTS: "*"
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - ./mlflow:/mlflow
