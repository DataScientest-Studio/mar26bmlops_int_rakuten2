version: "3.9"

services:
  api:
    build: .
    container_name: rakuten_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - mlflow

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: rakuten_mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --port 5000