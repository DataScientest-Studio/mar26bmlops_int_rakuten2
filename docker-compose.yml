services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_SERVER_ALLOWED_HOSTS: "localhost:5000,localhost,127.0.0.1:5000,127.0.0.1,mlflow:5000,mlflow"
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - ./mlflow:/mlflow
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; req=urllib.request.Request('http://localhost:5000', headers={'Host':'localhost:5000'}); urllib.request.urlopen(req).read()"]
      interval: 15s
      timeout: 10s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rakuten_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./db:/app/db

  training:
    build:
      context: .
      dockerfile: Dockerfile.training
    container_name: rakuten_training
    env_file:
      - .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./db:/app/db
      - ./mlflow:/mlflow
    command: python -m src.models.train_model_ice_mk