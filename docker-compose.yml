services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
      --allowed-hosts localhost,127.0.0.1,192.168.178.26,192.168.178.26:5000,mlflow,mlflow:5000
    volumes:
      - ./mlflow:/mlflow
    healthcheck:
      test: ["CMD-SHELL", "curl -H 'Host: localhost:5000' -f http://localhost:5000 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rakuten_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./db:/app/db

  training:
    build:
      context: .
      dockerfile: Dockerfile.training
    container_name: rakuten_training
    env_file:
      - .env
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./db:/app/db
      - ./mlflow:/mlflow
    command: python -m src.models.train_model_ice_mk