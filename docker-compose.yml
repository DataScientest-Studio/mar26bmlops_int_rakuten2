services:
  # -- MinIO S3-compatible local storage --
  minio:
    image: minio/minio:latest
    container_name: rakuten_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # -- MinIO bucket init --
  minio_init:
    image: minio/mc:latest
    container_name: rakuten_minio_init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET_DATA: ${MINIO_BUCKET_DATA}
      MINIO_BUCKET_IMAGES: ${MINIO_BUCKET_IMAGES}
    entrypoint: >
      /bin/sh -c "
        sleep 10 &&
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/mlflow-artifacts &&
        mc mb --ignore-existing local/$${MINIO_BUCKET_DATA} &&
        mc mb --ignore-existing local/$${MINIO_BUCKET_IMAGES} &&
        echo 'Buckets ready'
      "

  # -- MLflow tracking server --
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    ports:
      - "5000:5000"
    environment:
      MLFLOW_SERVER_ALLOWED_HOSTS: "*"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      bash -c "pip install psycopg2-binary --quiet &&
      mlflow server
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      --default-artifact-root s3://mlflow-artifacts/
      --host 0.0.0.0
      --port 5000
      --allowed-hosts '*'"
    depends_on:
      minio_init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health').read()"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # -- FastAPI serving --
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rakuten_api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MINIO_ENDPOINT: minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      IMAGE_SOURCE: minio
      DATA_SOURCE: minio
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./db:/app/db
    restart: unless-stopped

  # -- GPU training container --
  training:
    build:
      context: .
      dockerfile: Dockerfile.training
    container_name: rakuten_training
    env_file: .env
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      MINIO_ENDPOINT: minio:9000
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      IMAGE_SOURCE: local
      DATA_SOURCE: local
      IMAGE_DIR: /app/data/images
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./db:/app/db
    shm_size: "4gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: python -m src.models.train_model_final
    profiles:
      - training

  # -- PostgreSQL --
  postgres:
    image: postgres:16-alpine
    container_name: rakuten_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # -- Adminer DB UI --
  adminer:
    image: adminer
    container_name: rakuten_adminer
    ports:
      - "5050:8080"
    restart: unless-stopped

volumes:
  minio_data:
  postgres_data: