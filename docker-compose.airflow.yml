# docker-compose.airflow.yml
# Airflow extension — run alongside the base docker-compose.yml
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.airflow.yml up -d
#
# First time setup:
#   docker compose -f docker-compose.yml -f docker-compose.airflow.yml \
#     run --rm airflow-init
#
# Access Airflow UI: http://localhost:8080 (admin / admin)

services:
  airflow-init:
    image: apache/airflow:2.10.4-python3.11
    container_name: rakuten_airflow_init
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://postgres:postgres@postgres:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ""
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@localhost
        echo "Airflow init done."
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.10.4-python3.11
    container_name: rakuten_airflow_web
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://postgres:postgres@postgres:5432/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: /opt/airflow/app
      # MLflow/MinIO access from within Airflow tasks
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/airflow/app       # project root → PYTHONPATH
      - ./data:/opt/airflow/app/data
      - ./models:/opt/airflow/app/models
      - ./db:/opt/airflow/app/db
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy
    command: airflow webserver --port 8080
    restart: unless-stopped

  airflow-scheduler:
    image: apache/airflow:2.10.4-python3.11
    container_name: rakuten_airflow_scheduler
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql://postgres:postgres@postgres:5432/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      PYTHONPATH: /opt/airflow/app
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - .:/opt/airflow/app
      - ./data:/opt/airflow/app/data
      - ./models:/opt/airflow/app/models
      - ./db:/opt/airflow/app/db
    depends_on:
      postgres:
        condition: service_healthy
    command: airflow scheduler
    restart: unless-stopped
